<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Makes the page scale correctly on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RM Notes</title>

    <!-- Links to our CSS file for all styling -->
    <link rel="stylesheet" href="css/styles.css" />

    <!-- PWA meta tags - allows app to be installed on phone/desktop -->
    <meta name="theme-color" content="#f59e0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RM Notes" />
  </head>

  <body>
    <!-- ===== HEADER ===== -->
    <!-- Appears on every screen, contains back button and app title -->
    <header class="app-header">
      <!-- Back button - hidden on home screen, shown on template screens -->
      <button class="back-btn" id="backBtn" onclick="goBack()" aria-label="Go back">
        &#8592;
        <!-- Left arrow character -->
      </button>
      <h1 class="app-title">RM Notes</h1>
    </header>

    <!-- ===== HOME SCREEN ===== -->
    <!-- The landing page with buttons for each template category -->
    <main id="screen-home" class="screen active">
      <p class="screen-subtitle">Midwifery Documentation Templates</p>

      <div class="tool-grid">
        <!-- Each button navigates to a template screen -->
        <!-- onclick="navigateTo('screen-id')" is how navigation works -->

        <button class="tool-btn" onclick="navigateTo('screen-triage')">
          <span class="tool-icon">🏥</span>
          <span class="tool-label">Triage & Admission</span>
        </button>

        <button class="tool-btn" onclick="navigateTo('screen-progress')">
          <span class="tool-icon">📋</span>
          <span class="tool-label">Labour Progress Note</span>
        </button>

        <button class="tool-btn" onclick="navigateTo('screen-delivery')">
          <span class="tool-icon">👶</span>
          <span class="tool-label">Delivery Note</span>
        </button>

        <button class="tool-btn" onclick="navigateTo('screen-maternal-discharge')">
          <span class="tool-icon">🏠</span>
          <span class="tool-label">Maternal Discharge</span>
        </button>

        <button class="tool-btn" onclick="navigateTo('screen-newborn-admission')">
          <span class="tool-icon">🩺</span>
          <span class="tool-label">Newborn Admission</span>
        </button>

        <button class="tool-btn" onclick="navigateTo('screen-newborn-discharge')">
          <span class="tool-icon">🏠</span>
          <span class="tool-label">Newborn Discharge</span>
        </button>

        <button class="tool-btn" onclick="navigateTo('screen-perineal')">
          <span class="tool-icon">📝</span>
          <span class="tool-label">Perineal Repair</span>
        </button>

        <button class="tool-btn" onclick="navigateTo('screen-transfer')">
          <span class="tool-icon">🔄</span>
          <span class="tool-label">Transfer of Care</span>
        </button>
      </div>
    </main>

    <!-- ===== TEMPLATE SCREENS ===== -->
    <!-- Each screen below follows the same pattern:
         - id matches what navigateTo() expects
         - class="screen" means it starts hidden
         - template-content holds the note text
         - copy button at bottom sends text to clipboard -->

    <!-- TRIAGE & ADMISSION -->
    <main id="screen-triage" class="screen">
      <h2 class="screen-title">Triage & Admission Note</h2>
      <!-- Template text lives in a textarea so it's editable before copying -->
      <textarea class="template-area" id="text-triage">
[TRIAGE & ADMISSION NOTE - coming soon]
      </textarea>
      <button class="copy-btn" onclick="copyTemplate('text-triage')">Copy to Clipboard</button>
    </main>

    <!-- LABOUR PROGRESS NOTE -->
    <main id="screen-progress" class="screen">
      <h2 class="screen-title">Labour Progress Note</h2>
      <textarea class="template-area" id="text-progress">
[LABOUR PROGRESS NOTE - coming soon]
      </textarea>
      <button class="copy-btn" onclick="copyTemplate('text-progress')">Copy to Clipboard</button>
    </main>

    <!-- DELIVERY NOTE -->
    <main id="screen-delivery" class="screen">
      <h2 class="screen-title">Delivery Note</h2>
      <textarea class="template-area" id="text-delivery">
[DELIVERY NOTE - coming soon]
      </textarea>
      <button class="copy-btn" onclick="copyTemplate('text-delivery')">Copy to Clipboard</button>
    </main>

    <!-- MATERNAL DISCHARGE -->
    <main id="screen-maternal-discharge" class="screen">
      <h2 class="screen-title">Maternal Discharge Summary</h2>
      <textarea class="template-area" id="text-maternal-discharge">
[MATERNAL DISCHARGE SUMMARY - coming soon]
      </textarea>
      <button class="copy-btn" onclick="copyTemplate('text-maternal-discharge')">Copy to Clipboard</button>
    </main>

    <!-- NEWBORN ADMISSION -->
    <main id="screen-newborn-admission" class="screen">
      <h2 class="screen-title">Newborn Admission H&P</h2>
      <textarea class="template-area" id="text-newborn-admission">
[NEWBORN ADMISSION H&P - coming soon]
      </textarea>
      <button class="copy-btn" onclick="copyTemplate('text-newborn-admission')">Copy to Clipboard</button>
    </main>

    <!-- NEWBORN DISCHARGE -->
    <main id="screen-newborn-discharge" class="screen">
      <h2 class="screen-title">Newborn Discharge Summary</h2>
      <textarea class="template-area" id="text-newborn-discharge">
[NEWBORN DISCHARGE SUMMARY - coming soon]
      </textarea>
      <button class="copy-btn" onclick="copyTemplate('text-newborn-discharge')">Copy to Clipboard</button>
    </main>

    <!-- PERINEAL REPAIR -->
    <main id="screen-perineal" class="screen">
      <h2 class="screen-title">Perineal Repair</h2>
      <textarea class="template-area" id="text-perineal">
[PERINEAL REPAIR NOTE - coming soon]
      </textarea>
      <button class="copy-btn" onclick="copyTemplate('text-perineal')">Copy to Clipboard</button>
    </main>

    <!-- TRANSFER OF CARE -->
    <main id="screen-transfer" class="screen">
      <h2 class="screen-title">Transfer of Care to OB</h2>
      <textarea class="template-area" id="text-transfer">
[TRANSFER OF CARE NOTE - coming soon]
      </textarea>
      <button class="copy-btn" onclick="copyTemplate('text-transfer')">Copy to Clipboard</button>
    </main>

    <!-- Links to our JavaScript file - always at bottom of body -->
    <script src="js/app.js"></script>
  </body>
</html>
